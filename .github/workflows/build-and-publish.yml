name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after build'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package: darwin-arm64
            gpu: metal
          - os: ubuntu-22.04
            package: linux-x64
            gpu: cpu
          - os: ubuntu-22.04
            package: linux-x64-cuda
            gpu: cuda
          - os: ubuntu-22.04-arm
            package: linux-arm64
            gpu: cpu
          - os: windows-2022
            package: win32-x64
            gpu: cpu
          - os: windows-2022
            package: win32-x64-cuda
            gpu: cuda

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      # --- ccache for faster rebuilds ---
      - name: Install ccache (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ccache

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Install ccache and Ninja (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install ccache ninja -y

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:\Users\runneradmin\AppData\Local\ccache' || '~/.cache/ccache' }}
          key: ccache-${{ matrix.package }}-${{ hashFiles('engine/**/*.cpp', 'engine/**/*.h', 'engine/**/*.hpp', 'cpp/**/*.cpp', 'cpp/**/*.h', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-${{ matrix.package }}-

      - name: Configure ccache
        shell: bash
        run: |
          ccache --set-config=max_size=1G
          ccache --set-config=compression=true
          ccache -z

      # --- CUDA toolkit (cached on both Linux and Windows) ---
      - name: Cache CUDA Toolkit
        if: matrix.gpu == 'cuda'
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.1' || '/usr/local/cuda' }}
          key: cuda-13.1.0-${{ matrix.os }}

      - name: Install CUDA Toolkit
        if: matrix.gpu == 'cuda' && steps.cache-cuda.outputs.cache-hit != 'true'
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.1.0'

      - name: Set CUDA env (Linux)
        if: matrix.gpu == 'cuda' && runner.os == 'Linux'
        run: |
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV

      - name: Set CUDA env (Windows)
        if: matrix.gpu == 'cuda' && runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v13.1/bin" >> $GITHUB_PATH
          echo "CUDA_PATH=C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v13.1" >> $GITHUB_ENV

      # --- Build ---
      - name: Install dependencies
        run: npm install

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native addons
        shell: bash
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            npx cmake-js compile --parallel --generator Ninja --CDCMAKE_C_COMPILER=cl --CDCMAKE_CXX_COMPILER=cl --CDGPU_BACKEND=${{ matrix.gpu }}
          else
            npm run build:${{ matrix.gpu }}
          fi

      - name: ccache stats
        shell: bash
        run: ccache -s

      # --- Bundle Windows runtime DLLs alongside omni.node ---
      # CUDA DLLs (cublas64, cublasLt64) are NOT bundled — they total ~637 MB
      # which exceeds npm's publish limit. Users need the CUDA Toolkit installed,
      # same as Linux CUDA users. cudart is statically linked via GGML_STATIC.

      - name: Bundle VC++ OpenMP runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # vcomp140.dll is needed by ggml's CPU backend (OpenMP)
          VCOMP=$(find "/c/Program Files/Microsoft Visual Studio" -path "*/x64/*" -name "vcomp140.dll" 2>/dev/null | head -1)
          if [[ -n "$VCOMP" ]]; then
            cp "$VCOMP" build/Release/
            echo "Bundled vcomp140.dll from: $VCOMP"
          else
            echo "WARNING: vcomp140.dll not found in VS installation"
          fi

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp build/Release/*.node artifacts/
          cp build/Release/*.metallib artifacts/ 2>/dev/null || true
          cp build/Release/*.dll artifacts/ 2>/dev/null || true
          cp packages/${{ matrix.package }}/package.json artifacts/
          echo "Packaged artifacts:"
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: artifacts/

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run build:ts

      - name: Generate version
        id: version
        run: echo "version=$(date -u +'%Y.%-m%d.%-H%M')" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '{darwin-*,linux-*,win32-*}'
          merge-multiple: false

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for dir in artifacts/*/; do
            pkg=$(basename "$dir")
            if [[ ! -f "$dir/package.json" ]]; then
              echo "Skipping $pkg (no package.json)"
              continue
            fi
            echo "Publishing @agent-orcha/node-omni-orcha-$pkg@$VERSION"
            cd "$dir"
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              p.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            npm publish --access public --provenance
            cd - > /dev/null
          done

      - name: Align optionalDependencies versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(p.optionalDependencies || {})) {
              p.optionalDependencies[k] = '$VERSION';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
