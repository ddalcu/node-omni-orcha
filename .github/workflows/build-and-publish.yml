name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            package: darwin-arm64
            gpu: metal
          - os: ubuntu-24.04
            package: linux-x64
            gpu: cpu
          - os: ubuntu-24.04
            package: linux-x64-cuda
            gpu: cuda
          - os: ubuntu-24.04-arm
            package: linux-arm64
            gpu: cpu
          - os: windows-2022
            package: win32-x64
            gpu: cpu
          - os: windows-2022
            package: win32-x64-cuda
            gpu: cuda

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      # --- ccache for faster rebuilds ---
      - name: Install ccache (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ccache

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Install ccache (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install ccache -y

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && 'C:\Users\runneradmin\AppData\Local\ccache' || '~/.cache/ccache' }}
          key: ccache-${{ matrix.package }}-${{ hashFiles('engine/**/*.cpp', 'engine/**/*.h', 'engine/**/*.hpp', 'cpp/**/*.cpp', 'cpp/**/*.h', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-${{ matrix.package }}-

      - name: Configure ccache
        shell: bash
        run: |
          ccache --set-config=max_size=1G
          ccache --set-config=compression=true
          ccache -z

      # --- CUDA toolkit (cached on Linux, always fresh on Windows) ---
      - name: Cache CUDA Toolkit (Linux)
        if: matrix.gpu == 'cuda' && runner.os == 'Linux'
        id: cache-cuda
        uses: actions/cache@v4
        with:
          path: /usr/local/cuda
          key: cuda-12.6.3-${{ runner.os }}

      - name: Install CUDA Toolkit
        if: matrix.gpu == 'cuda' && (runner.os == 'Windows' || steps.cache-cuda.outputs.cache-hit != 'true')
        uses: Jimver/cuda-toolkit@v0.2.22
        with:
          cuda: '12.6.3'

      - name: Set CUDA env (Linux)
        if: matrix.gpu == 'cuda' && runner.os == 'Linux'
        run: |
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH
          echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV

      - name: Set CUDA env (Windows)
        if: matrix.gpu == 'cuda' && runner.os == 'Windows'
        shell: bash
        run: |
          echo "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.6/bin" >> $GITHUB_PATH
          echo "CUDA_PATH=C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.6" >> $GITHUB_ENV

      # --- Build ---
      - name: Install dependencies
        run: npm install

      - name: Build native addons
        shell: bash
        run: |
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          npm run build:${{ matrix.gpu }}

      - name: ccache stats
        shell: bash
        run: ccache -s

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp build/Release/*.node artifacts/
          cp build/Release/*.metallib artifacts/ 2>/dev/null || true
          cp packages/${{ matrix.package }}/package.json artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: artifacts/

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate version
        id: version
        run: echo "version=$(date -u +'%Y.%-m%d.%-H%M')" >> "$GITHUB_OUTPUT"

      - name: Set version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '{darwin-*,linux-*,win32-*}'
          merge-multiple: false

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for dir in artifacts/*/; do
            pkg=$(basename "$dir")
            # Skip directories that aren't platform packages
            if [[ ! -f "$dir/package.json" ]]; then
              echo "Skipping $pkg (no package.json)"
              continue
            fi
            echo "Publishing @agent-orcha/node-omni-orcha-$pkg@$VERSION"
            cd "$dir"
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              p.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            npm publish --access public --provenance
            cd - > /dev/null
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
